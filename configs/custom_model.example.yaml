# Copy this file to configs/custom_model.yaml and edit the model entry.
# Then run:
#   python src/evaluate.py --config configs/custom_model.yaml --models my_hf_vlm --limit 5
#   python src/metrics.py
#
# Provider choices already registered in src/vlm_clients.py:
#   mock, openai_stub, hf_chat_template, qwen25_vl, smolvlm, internvl3, llava_hf
#
# Do not put API keys in this file. Put secret values in your shell environment
# or a local .env file that is not committed.
models:
  # Keep mock available for a quick no-GPU smoke test of the custom config path.
  - name: custom_mock
    provider: mock
    max_retries: 1

  # Example Hugging Face multimodal model using the generic chat-template client.
  # Replace model_id/model_class if your model uses another Transformers class.
  - name: my_hf_vlm
    provider: hf_chat_template
    model_id: Qwen/Qwen3-VL-4B-Instruct
    model_class: Qwen3VLForConditionalGeneration
    image_content_key: image
    load_in_4bit: false
    torch_dtype: bfloat16
    max_new_tokens: 96
    max_retries: 1
    prompt_suffix: Return exactly two lines: Answer: <short final answer only> and Evidence: <one concise sentence describing the visual evidence used>. Do not add extra lines.

  # Example API-backed placeholder. Implement the provider before real use.
  - name: my_api_vlm
    provider: openai_stub
    api_key_env: OPENAI_API_KEY
    max_retries: 1
